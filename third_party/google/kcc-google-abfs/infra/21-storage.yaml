# GCS bucket for ABFS blobs.
#
# Bucket names are globally unique: REPLACE_BUCKET_NAME must be a name you own,
# e.g. abfs-<random-suffix>. Choose your own stable, unique name here (a random
# hex suffix is a common way to keep it globally unique).
#
# force-destroy: "false" prevents accidental deletion of a non-empty bucket.
apiVersion: storage.cnrm.cloud.google.com/v1beta1
kind: StorageBucket
metadata:
  name: REPLACE_BUCKET_NAME
  namespace: abfs
  annotations:
    # Abandon on CR delete so removing the resource never deletes the ABFS content
    # store; force-destroy:false additionally blocks deleting a non-empty bucket.
    cnrm.cloud.google.com/deletion-policy: "abandon"
    cnrm.cloud.google.com/force-destroy: "false"
spec:
  # e.g. europe-west1
  location: REPLACE_BUCKET_LOCATION
  uniformBucketLevelAccess: true
  publicAccessPrevention: enforced
