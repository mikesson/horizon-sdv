# Google service account (GSA) for the ABFS data plane = the ABFS runtime identity.
# Under the GCE-metadata identity model it is BOTH the dedicated ABFS node pool's node
# service account (--service-account, see docs/02 §1b) AND the SA the ABFS license is
# granted to, so it carries deletion-policy: abandon — never destroyed on CR delete.
#
# CREATE-vs-REFERENCE (mirrors the Terraform create-or-data toggle):
#   * Create a fresh SA (default): set RUNTIME_SA to a new name (e.g. abfs-runtime)
#     and CREATE_RUNTIME_SAS=true. This file creates it; 12-* binds its roles; you
#     submit it for the license and set it as the abfs-data node pool --service-account.
#   * Reference a pre-existing, already-licensed SA (bring-your-own): point RUNTIME_SA
#     at it (e.g. abfs-sa) and set CREATE_RUNTIME_SAS=false. scripts/render.sh then
#     DROPS this file (and its kustomization entry) so KCC does not try to create it;
#     12-* still binds roles onto it via an external reference.
#
# The GSA email is <metadata.name>@REPLACE_PROJECT_ID.iam.gserviceaccount.com
---
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMServiceAccount
metadata:
  name: REPLACE_RUNTIME_SA
  namespace: abfs
  annotations:
    cnrm.cloud.google.com/deletion-policy: "abandon"
spec:
  displayName: ABFS runtime service account
