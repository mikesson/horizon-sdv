# Google Cloud API enablement (serviceusage): enables the required Google Cloud
# APIs for the ABFS data plane, plus the GKE + CI/CD foundation scope.
#
# NOTE: serviceusage.googleapis.com, cloudresourcemanager.googleapis.com and
# iam.googleapis.com must be enabled manually BEFORE KCC can reconcile these
# (bootstrap). See docs/02-prerequisites-cluster-and-kcc.md.
#
# deletion-policy: abandon keeps the APIs enabled if these resources are deleted.
---
apiVersion: serviceusage.cnrm.cloud.google.com/v1beta1
kind: Service
metadata:
  name: compute.googleapis.com
  namespace: abfs
  annotations:
    cnrm.cloud.google.com/deletion-policy: "abandon"
    cnrm.cloud.google.com/disable-dependent-services: "false"
spec:
  resourceID: compute.googleapis.com
---
apiVersion: serviceusage.cnrm.cloud.google.com/v1beta1
kind: Service
metadata:
  name: container.googleapis.com
  namespace: abfs
  annotations:
    cnrm.cloud.google.com/deletion-policy: "abandon"
spec:
  resourceID: container.googleapis.com
---
