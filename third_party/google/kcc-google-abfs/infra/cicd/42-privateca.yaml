# Private CA pool + root CA, used to issue the instance certificate for a PRIVATE
# Secure Source Manager instance.
#
# Only needed if you run a PRIVATE SSM instance (see 41-secure-source-manager.yaml).
# Apply this BEFORE the SSM instance so the CA pool exists first.
---
apiVersion: privateca.cnrm.cloud.google.com/v1beta1
kind: PrivateCACAPool
metadata:
  name: ssm-ca-pool
  namespace: abfs
spec:
  projectRef:
    external: projects/REPLACE_PROJECT_ID
  # e.g. europe-west4
  location: REPLACE_SSM_REGION
  tier: ENTERPRISE
---
apiVersion: privateca.cnrm.cloud.google.com/v1beta1
kind: PrivateCACertificateAuthority
metadata:
  name: ssm-root-ca
  namespace: abfs
  annotations:
    # A CA must spend 30 days in DELETED state before full deletion, which blocks
    # CA-pool deletion; abandon on CR delete (matches the KCC sample guidance).
    cnrm.cloud.google.com/deletion-policy: "abandon"
spec:
  projectRef:
    external: projects/REPLACE_PROJECT_ID
  location: REPLACE_SSM_REGION
  type: SELF_SIGNED
  caPoolRef:
    name: ssm-ca-pool
  # CA lifetime, default 315360000s (10y)
  lifetime: 315360000s
  config:
    subjectConfig:
      subject:
        # CA subject organization (e.g. "Example.com")
        organization: "REPLACE_CA_ORGANIZATION"
        # CA subject common name (e.g. "SSM Root CA")
        commonName: "REPLACE_CA_COMMON_NAME"
    x509Config:
      caOptions:
        isCa: true
      keyUsage:
        baseKeyUsage:
          certSign: true
          crlSign: true
        extendedKeyUsage:
          serverAuth: true
  keySpec:
    # CA key algorithm (default RSA_PKCS1_4096_SHA256)
    algorithm: RSA_PKCS1_4096_SHA256
