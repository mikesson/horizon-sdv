# Cloud Workstations CI/CD foundation (KCC). Independent of the ABFS data plane.
# Apply with: kubectl apply -k infra/cicd/
# Requires the core layer (infra/) for the namespace + API enablement.
#
# Ordering note: if running a PRIVATE SSM instance, 42-privateca.yaml must
# reconcile before 41-secure-source-manager.yaml. kubectl/kustomize apply is not
# strictly ordered, so apply 42 first or re-apply until all reconcile.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - 40-artifact-registry.yaml
  - 41-secure-source-manager.yaml
  - 42-privateca.yaml
  - 43-cloud-build.yaml
  - 44-cloud-scheduler.yaml
  - 45-workstations.yaml
  - 46-cicd-iam.yaml
  - 47-monitoring.yaml
  - 48-ssm-seed-job.yaml
