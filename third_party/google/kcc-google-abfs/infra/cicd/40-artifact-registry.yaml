# Artifact Registry repository for the custom Cloud Workstations images
# (android-studio, android-studio-for-platform, code-oss), tagged :latest by the
# Cloud Build pipeline.
apiVersion: artifactregistry.cnrm.cloud.google.com/v1beta1
kind: ArtifactRegistryRepository
metadata:
  name: abfs-workstation-images
  namespace: abfs
  labels:
    app.kubernetes.io/part-of: abfs-cicd
spec:
  format: DOCKER
  # e.g. europe-west4
  location: REPLACE_AR_REGION
  description: "Custom Cloud Workstations images built by the CI/CD foundation"
