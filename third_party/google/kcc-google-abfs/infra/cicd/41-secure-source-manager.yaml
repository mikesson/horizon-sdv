# Secure Source Manager (SSM) instance + repository that hosts the source for the
# custom Cloud Workstations images.
#
# CAVEATS (see docs/06-cicd-foundation.md):
#  * SSM is seeded by CLONING an upstream git repo (e.g. the public horizon-sdv
#    repo) into the new SSM repo, but KCC's SecureSourceManagerRepository
#    .initialConfig only seeds defaultBranch/readme/license/gitignores — it does
#    NOT clone a URL. Perform the initial clone+push out-of-band (a one-off Job or
#    `git push`) after the repo exists; that first push is what triggers the first
#    Cloud Build.
#  * For a PUBLIC instance, omit kmsKeyRef/privateConfig. For a PRIVATE instance,
#    apply 42-privateca.yaml first and wire the CA pool here.
---
apiVersion: securesourcemanager.cnrm.cloud.google.com/v1beta1
kind: SecureSourceManagerInstance
metadata:
  name: cicd-foundation
  namespace: abfs
spec:
  projectRef:
    external: projects/REPLACE_PROJECT_ID
  # e.g. europe-west4
  location: REPLACE_SSM_REGION
  # --- PRIVATE instance options (uncomment + apply 42-privateca.yaml first) ---
  # privateConfig:
  #   isPrivate: true
  #   caPoolRef:
  #     name: ssm-ca-pool
---
apiVersion: securesourcemanager.cnrm.cloud.google.com/v1beta1
kind: SecureSourceManagerRepository
metadata:
  name: horizon-sdv
  namespace: abfs
spec:
  projectRef:
    external: projects/REPLACE_PROJECT_ID
  location: REPLACE_SSM_REGION
  instanceRef:
    name: cicd-foundation
  initialConfig:
    # Default trigger branch ("main").
    defaultBranch: main
    readme: default
