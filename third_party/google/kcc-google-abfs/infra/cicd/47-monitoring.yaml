# Monitoring: an email notification channel + an OOM-killings alert policy.
#
# The alert fires when guest-system OOM-kill events spike across the project.
---
# Email notification channel (REPLACE_ALERT_EMAIL).
# NOTE: MonitoringNotificationChannel has no displayName in spec, so the channel's
# human-readable name is carried in `description` instead.
apiVersion: monitoring.cnrm.cloud.google.com/v1beta1
kind: MonitoringNotificationChannel
metadata:
  name: abfs-email-alerts
  namespace: abfs
spec:
  type: email
  enabled: true
  description: "ABFS Email Notification Channel"
  labels:
    email_address: REPLACE_ALERT_EMAIL
---
# OOM-killings alert policy. conditionPrometheusQueryLanguage is supported in this
# CRD version. notificationChannels references the channel above by KCC name.
apiVersion: monitoring.cnrm.cloud.google.com/v1beta1
kind: MonitoringAlertPolicy
metadata:
  name: abfs-oom-killings
  namespace: abfs
spec:
  displayName: "Container OOM Killings"
  enabled: true
  combiner: "OR"
  notificationChannels:
    - name: abfs-email-alerts
  conditions:
    - displayName: "Container OOM Killings"
      conditionPrometheusQueryLanguage:
        query: 'sum(increase(compute_googleapis_com:guest_system_problem_count{reason="OOMKilling"}[30m])) by (project_id) >= 3'
        duration: "60s"
        evaluationInterval: "60s"
