# Cluster-scoped Config Connector operator configuration.
# Applied ONCE per cluster after the Config Connector operator is installed.
# Mode "namespaced" => each namespace declares its own Google identity via a
# ConfigConnectorContext (see configconnectorcontext.yaml).
#
# Prereq: the Config Connector operator must already be installed in the cluster
# (see docs/02-prerequisites-cluster-and-kcc.md).
apiVersion: core.cnrm.cloud.google.com/v1beta1
kind: ConfigConnector
metadata:
  # the ConfigConnector object is a singleton and must be named "configconnector.core.cnrm.cloud.google.com"
  name: configconnector.core.cnrm.cloud.google.com
spec:
  mode: namespaced
  # Prevent KCC from writing unspecified server-side fields back into resource
  # specs. Required to avoid endless update loops with autoscaling/autoupdating
  # fields — e.g. the SpannerInstance autoscalingConfig in infra/20-spanner.yaml.
  # `Absent` is the default for CRDs added in v1.114.0+ and for all KCC from v1.123.
  stateIntoSpec: Absent
