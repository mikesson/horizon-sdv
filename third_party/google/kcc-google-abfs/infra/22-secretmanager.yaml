# Secret Manager "pusher-config" secret + accessor binding (grants the ABFS runtime
# SA secretAccessor on the secret).
#
# NOTE ON GKE: the pusher-config CONTENT is rendered by the Helm chart as a
# ConfigMap that the bootstrap Job mounts directly (no Secret Manager round-trip
# needed in-cluster). This SecretManagerSecret is created for any ABFS component
# that expects the config in Secret Manager. The secret VERSION (actual data) is
# intentionally not managed here; populate it out-of-band if you rely on it,
# otherwise the chart's ConfigMap is the operative source.
#
# To use user-managed replication, replace `automatic: true` with a userManaged
# block (listing your replication locations).
---
apiVersion: secretmanager.cnrm.cloud.google.com/v1beta1
kind: SecretManagerSecret
metadata:
  name: pusher-config
  namespace: abfs
spec:
  replication:
    automatic: true
---
# Grant the ABFS runtime SA access to read the secret.
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMPolicyMember
metadata:
  name: pusher-config-accessor
  namespace: abfs
spec:
  # Runtime SA referenced by email (REPLACE_RUNTIME_SA) so the grant works whether
  # the SA is created by 10-* or is a pre-existing (already-licensed) SA.
  member: "serviceAccount:REPLACE_RUNTIME_SA@REPLACE_PROJECT_ID.iam.gserviceaccount.com"
  role: roles/secretmanager.secretAccessor
  resourceRef:
    apiVersion: secretmanager.cnrm.cloud.google.com/v1beta1
    kind: SecretManagerSecret
    name: pusher-config
