# Namespace that holds both the KCC resources (infra/) and the ABFS workloads
# (Helm chart). The project-id annotation tells Config Connector which Google
# Cloud project to reconcile resources into (namespaced mode).
#
# REPLACE_PROJECT_ID -> your Google Cloud project ID.
apiVersion: v1
kind: Namespace
metadata:
  name: abfs
  annotations:
    cnrm.cloud.google.com/project-id: "REPLACE_PROJECT_ID"
  labels:
    app.kubernetes.io/part-of: abfs
    # The ABFS pods run privileged + hostPID for the casfs mount. Enforce the
    # `privileged` Pod Security Standard so they are admitted even on clusters whose
    # default Pod Security Admission level is baseline/restricted.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: privileged
    pod-security.kubernetes.io/audit: privileged
