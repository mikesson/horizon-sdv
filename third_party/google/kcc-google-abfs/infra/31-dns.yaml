# Private DNS zones for Private Google Access: googleapis.com and pkg.dev private
# zones pointing at the restricted/private VIP 199.36.153.8-11 =
# private.googleapis.com.
#
# These zones attach to the pre-existing VPC via networkRef.external. The VPC is
# not created here and is not assumed to be a Shared VPC host; resources target the
# project set on the namespace (infra/00-namespace.yaml).

# ===================== googleapis.com =====================
---
apiVersion: dns.cnrm.cloud.google.com/v1beta1
kind: DNSManagedZone
metadata:
  name: private-google-apis
  namespace: abfs
spec:
  description: "Private DNS zone for Google APIs"
  dnsName: "googleapis.com."
  visibility: private
  privateVisibilityConfig:
    networks:
      - networkRef:
          external: "projects/REPLACE_PROJECT_ID/global/networks/REPLACE_NETWORK_NAME"
---
apiVersion: dns.cnrm.cloud.google.com/v1beta1
kind: DNSRecordSet
metadata:
  name: googleapis-cname-wildcard
  namespace: abfs
spec:
  name: "*.googleapis.com."
  type: "CNAME"
  ttl: 300
  managedZoneRef:
    name: private-google-apis
  rrdatas:
    - "private.googleapis.com."
---
apiVersion: dns.cnrm.cloud.google.com/v1beta1
kind: DNSRecordSet
metadata:
  name: googleapis-a-private
  namespace: abfs
spec:
  name: "private.googleapis.com."
  type: "A"
  ttl: 300
  managedZoneRef:
    name: private-google-apis
  rrdatas:
    - "199.36.153.8"
    - "199.36.153.9"
    - "199.36.153.10"
    - "199.36.153.11"

# ===================== pkg.dev (Artifact Registry) =====================
---
