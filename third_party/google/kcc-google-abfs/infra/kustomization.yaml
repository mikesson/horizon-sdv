# Core ABFS infrastructure (KCC). Apply with:
#   kubectl apply -k infra/
# The CI/CD foundation is a separate layer: kubectl apply -k infra/cicd/
#
# `setup/` is intentionally excluded — those operator CRs are applied once during
# cluster/KCC bootstrap, not as part of the regular infra reconcile.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - 00-namespace.yaml
  - 01-services.yaml
  - 10-iam-service-accounts.yaml
  - 12-iam-project-roles.yaml
  - 20-spanner.yaml
  - 21-storage.yaml
  - 22-secretmanager.yaml
  - 30-network-firewall.yaml
  - 31-dns.yaml
