# Project-level IAM for the single ABFS runtime service account. Additive
# (IAMPolicyMember): grants it every project role the data plane needs — Spanner,
# GCS, monitoring, logging.
#
# Under the GCE-metadata identity model this SA is BOTH the workloads' Google
# identity AND the dedicated ABFS node pool's node service account (see docs/02 §1b),
# so the monitoring/logging/stackdriver grants below also cover node health. It must
# additionally hold Artifact Registry read on the project that hosts the ABFS image
# (a separate project — grant that there, not here).
#
# member references the SA by email (REPLACE_RUNTIME_SA@REPLACE_PROJECT_ID...), so the
# grants work whether the SA is created by 10-* or is a pre-existing, already-licensed
# SA (e.g. abfs-sa).
---
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMPolicyMember
metadata:
  name: abfs-runtime-spanner-dbuser
  namespace: abfs
spec:
  member: "serviceAccount:REPLACE_RUNTIME_SA@REPLACE_PROJECT_ID.iam.gserviceaccount.com"
  role: roles/spanner.databaseUser
  resourceRef:
    kind: Project
    external: projects/REPLACE_PROJECT_ID
---
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMPolicyMember
metadata:
  name: abfs-runtime-storage-objectadmin
  namespace: abfs
spec:
  member: "serviceAccount:REPLACE_RUNTIME_SA@REPLACE_PROJECT_ID.iam.gserviceaccount.com"
  role: roles/storage.objectAdmin
  resourceRef:
    kind: Project
    external: projects/REPLACE_PROJECT_ID
---
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMPolicyMember
metadata:
  name: abfs-runtime-monitoring-metricwriter
  namespace: abfs
spec:
  member: "serviceAccount:REPLACE_RUNTIME_SA@REPLACE_PROJECT_ID.iam.gserviceaccount.com"
  role: roles/monitoring.metricWriter
  resourceRef:
    kind: Project
    external: projects/REPLACE_PROJECT_ID
---
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMPolicyMember
metadata:
  name: abfs-runtime-monitoring-viewer
  namespace: abfs
spec:
  member: "serviceAccount:REPLACE_RUNTIME_SA@REPLACE_PROJECT_ID.iam.gserviceaccount.com"
  role: roles/monitoring.viewer
  resourceRef:
    kind: Project
    external: projects/REPLACE_PROJECT_ID
---
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMPolicyMember
metadata:
  name: abfs-runtime-stackdriver-metadatawriter
  namespace: abfs
spec:
  member: "serviceAccount:REPLACE_RUNTIME_SA@REPLACE_PROJECT_ID.iam.gserviceaccount.com"
  role: roles/stackdriver.resourceMetadata.writer
  resourceRef:
    kind: Project
    external: projects/REPLACE_PROJECT_ID
---
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMPolicyMember
metadata:
  name: abfs-runtime-logging-logwriter
  namespace: abfs
spec:
  member: "serviceAccount:REPLACE_RUNTIME_SA@REPLACE_PROJECT_ID.iam.gserviceaccount.com"
  role: roles/logging.logWriter
  resourceRef:
    kind: Project
    external: projects/REPLACE_PROJECT_ID
