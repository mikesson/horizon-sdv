{{- if and (include "abfs.licensed" .) .Values.vpa.enabled }}
# Vertical Pod Autoscaler right-sizing for the ABFS workloads. Requires the cluster
# addon (--enable-vertical-pod-autoscaling; see docs/02). updateMode "Off" =
# recommendations only (read `kubectl describe vpa <name>`); "Initial" right-sizes at
# pod (re)start; "Auto" also evicts to resize (disruptive for the stateful server).
{{- if .Values.server.enabled }}
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ include "abfs.server.name" . }}
  labels:
    {{- include "abfs.labels" . | nindent 4 }}
    {{- include "abfs.server.selectorLabels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "abfs.server.name" . }}
  updatePolicy:
    updateMode: {{ .Values.vpa.updateMode | quote }}
---
{{- end }}
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ include "abfs.uploader.name" . }}
  labels:
    {{- include "abfs.labels" . | nindent 4 }}
    {{- include "abfs.uploader.selectorLabels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  targetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: {{ include "abfs.uploader.name" . }}
  updatePolicy:
    updateMode: {{ .Values.vpa.updateMode | quote }}
{{- if .Values.ui.enabled }}
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ include "abfs.ui.name" . }}
  labels:
    {{- include "abfs.labels" . | nindent 4 }}
    {{- include "abfs.ui.selectorLabels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "abfs.ui.name" . }}
  updatePolicy:
    updateMode: {{ .Values.vpa.updateMode | quote }}
{{- end }}
{{- end }}
