{{- if and (include "abfs.licensed" .) .Values.ui.enabled }}
# ABFS UI Service. Defaults to ClusterIP; set ui.service.internalLoadBalancer=true
# for an internal L4 IP for browsers (like the server Service's internal-LB option).
apiVersion: v1
kind: Service
metadata:
  name: {{ include "abfs.ui.name" . }}
  labels:
    {{- include "abfs.labels" . | nindent 4 }}
    {{- include "abfs.ui.selectorLabels" . | nindent 4 }}
  {{- if or .Values.ui.service.internalLoadBalancer .Values.ui.service.annotations .Values.commonAnnotations }}
  annotations:
    {{- if .Values.ui.service.internalLoadBalancer }}
    networking.gke.io/load-balancer-type: "Internal"
    {{- end }}
    {{- with .Values.ui.service.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  type: {{ if .Values.ui.service.internalLoadBalancer }}LoadBalancer{{ else }}ClusterIP{{ end }}
  selector:
    {{- include "abfs.ui.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.ui.port }}
      targetPort: {{ .Values.ui.port }}
      protocol: TCP
{{- end }}
