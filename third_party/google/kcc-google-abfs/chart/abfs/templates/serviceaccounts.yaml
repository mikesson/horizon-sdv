{{- if .Values.createServiceAccounts }}
# Kubernetes service accounts for the ABFS pods (pod-level identity / RBAC). The
# workloads take their GOOGLE identity from the node pool's service account (the
# licensed runtime SA) via GCE metadata, NOT Workload Identity — so these KSAs carry
# no iam.gke.io annotation. Names must stay in sync with infra/. Set
# createServiceAccounts=false if the KSAs are managed outside this chart.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccounts.server }}
  labels:
    {{- include "abfs.labels" . | nindent 4 }}
    {{- include "abfs.server.selectorLabels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- if .Values.imagePullSecrets }}
imagePullSecrets:
  {{- toYaml .Values.imagePullSecrets | nindent 2 }}
{{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccounts.uploader }}
  labels:
    {{- include "abfs.labels" . | nindent 4 }}
    {{- include "abfs.uploader.selectorLabels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- if .Values.imagePullSecrets }}
imagePullSecrets:
  {{- toYaml .Values.imagePullSecrets | nindent 2 }}
{{- end }}
{{- if .Values.ui.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccounts.ui }}
  labels:
    {{- include "abfs.labels" . | nindent 4 }}
    {{- include "abfs.ui.selectorLabels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- if .Values.imagePullSecrets }}
imagePullSecrets:
  {{- toYaml .Values.imagePullSecrets | nindent 2 }}
{{- end }}
{{- end }}
{{- end }}
