{{- if include "abfs.licensed" . }}
# Headless Service backing the uploader StatefulSet — provides stable per-pod DNS
# (<namePrefix>-<ordinal>.<namePrefix>.<ns>.svc.cluster.local).
apiVersion: v1
kind: Service
metadata:
  name: {{ include "abfs.uploader.name" . }}
  labels:
    {{- include "abfs.labels" . | nindent 4 }}
    {{- include "abfs.uploader.selectorLabels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  clusterIP: None
  # Resolve DNS for pods that aren't Ready yet so the initContainer gate / UI proxy
  # can reach pods during rollout.
  publishNotReadyAddresses: true
  selector:
    {{- include "abfs.uploader.selectorLabels" . | nindent 4 }}
  ports:
    - name: pusher
      port: {{ .Values.pusher.defaults.port }}
      targetPort: {{ .Values.pusher.defaults.port }}
      protocol: TCP
{{- end }}
