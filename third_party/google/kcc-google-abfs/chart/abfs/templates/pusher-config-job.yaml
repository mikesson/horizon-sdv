{{- if include "abfs.licensed" . }}
# Pusher-config bootstrap Job. Runs as a Helm post-install/post-upgrade hook after
# the server is up, performing the init / cacheman / push / put-ref sequence that
# seeds the default pusher config. Uploaders gate on the server being reachable
# (their initContainer) so this can complete the ref before they serve.
apiVersion: batch/v1
kind: Job
metadata:
  name: abfs-pusher-config
  labels:
    {{- include "abfs.labels" . | nindent 4 }}
    app.kubernetes.io/component: pusher-config
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    {{- with .Values.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  backoffLimit: {{ .Values.pusher.job.backoffLimit }}
  {{- if .Values.pusher.job.activeDeadlineSeconds }}
  activeDeadlineSeconds: {{ .Values.pusher.job.activeDeadlineSeconds }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "abfs.labels" . | nindent 8 }}
        app.kubernetes.io/component: pusher-config
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-pusher.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ .Values.serviceAccounts.uploader }}
      automountServiceAccountToken: {{ .Values.automountServiceAccountToken }}
      # The bootstrap runs `abfs cacheman`, which mounts the casfs cache → hostPID + privileged.
      hostPID: {{ .Values.hostPID }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- if .Values.casfs.requireReady }}
        # cacheman mounts casfs, so gate on the module being loaded on the node first.
        {{- include "abfs.waitForCasfsInit" . | nindent 8 }}
        {{- end }}
        # Wait for the ABFS server to be reachable (plain TCP check → hardened context).
        - name: wait-for-server
          image: {{ include "abfs.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.restrictedSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command:
            - /bin/bash
            - -c
            - |
              until (exec 3<>/dev/tcp/{{ include "abfs.server.name" . }}/{{ .Values.server.service.port }}) 2>/dev/null; do
                echo "waiting for ABFS server..."; sleep 5;
              done
      containers:
        - name: pusher-config
          image: {{ include "abfs.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # privileged + cap-add=all: `abfs cacheman` mounts the casfs cache.
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -ex
              # Use the in-cluster server endpoint.
              ARGS="--remote-servers {{ include "abfs.server.name" . }}:{{ .Values.server.service.port }} --tunnel-ports 0 {{ include "abfs.clientFlags" . }}"

              # Build the directory structure ABFS hashpath resolution expects.
              mkdir -p /tmp/workspace && cd /tmp/workspace
              git init
              mkdir -p git-pusher clients
              cp /etc/pusher-config/default git-pusher/default
              echo "concurrent-uploads: {{ .Values.pusher.concurrentUploads }}" > clients/defaults
              git add git-pusher/default clients/defaults
              git config --global user.email "{{ include "abfs.runtimeServiceAccount" . | default "abfs-bootstrap@localhost" }}"
              git config --global user.name "ABFS Bootstrap Job"
              git commit -a -m "Creating the default pusher config."

              abfs $ARGS init
              abfs $ARGS cacheman run &
              if ! abfs cacheman ping -t 1m; then
                abfs cacheman tail -a
                exit 1
              fi
              abfs $ARGS push -r "$PWD"
              abfs cacheman wait

              # Point the ABFS ref at the tree object we just created.
              TREE=$(git rev-parse HEAD^{tree})
              echo "$TREE" config | abfs $ARGS test-client put-ref -p abfs-meta -s default-server
          env:
            {{- include "abfs.gomaxprocsEnv" . | nindent 12 }}
          volumeMounts:
            - name: pusher-config
              mountPath: /etc/pusher-config
              readOnly: true
      volumes:
        - name: pusher-config
          configMap:
            name: abfs-pusher-config
            items:
              - key: default
                path: default
{{- end }}
