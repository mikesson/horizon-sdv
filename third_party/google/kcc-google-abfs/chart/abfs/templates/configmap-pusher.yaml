# Pusher configuration consumed by the bootstrap Job. The bootstrap Job copies the
# "default" key to git-pusher/default and pushes it into ABFS.
#
# The pusher names MUST equal the uploader pod hostnames (<namePrefix>-<ordinal>).
apiVersion: v1
kind: ConfigMap
metadata:
  name: abfs-pusher-config
  labels:
    {{- include "abfs.labels" . | nindent 4 }}
    {{- include "abfs.uploader.selectorLabels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  default: |
    name: default

    pushers-count: {{ .Values.uploader.count }}

    defaults:
      port: {{ .Values.pusher.defaults.port }}
      max-remote-pushes: {{ .Values.pusher.defaults.maxRemotePushes }}
      max-projects-syncs: {{ .Values.pusher.defaults.maxProjectsSyncs }}

    pushers:
    {{- range $i := until (int .Values.uploader.count) }}
      - name: {{ $.Values.uploader.namePrefix }}-{{ $i }}
    {{- end }}

    repos:
      - manifest:
          url: {{ .Values.pusher.manifestProjectUrl }}
          files:
        {{- range .Values.pusher.branchFiles }}
            - branch: {{ .branch }}
              file: {{ .file }}
        {{- end }}
        project-defaults:
          workers: {{ .Values.pusher.workers }}
          fetch-ref-spec:
            - refs/*:refs/*
            - ^refs/changes/*/meta
            - ^refs/changes/*/robot-comments
            - ^refs/cache-automerge/*
