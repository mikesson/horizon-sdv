{{- if and (include "abfs.licensed" .) .Values.uploader.preStartHooks }}
# Optional uploader pre-start hook scripts (uploader.preStartHooks), mounted at
# /etc/abfs/pre-start.d on each uploader pod.
apiVersion: v1
kind: ConfigMap
metadata:
  name: abfs-uploader-pre-start-hooks
  labels:
    {{- include "abfs.labels" . | nindent 4 }}
    {{- include "abfs.uploader.selectorLabels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  {{- range $name, $content := .Values.uploader.preStartHooks }}
  {{ $name }}: |
    {{- $content | nindent 4 }}
  {{- end }}
{{- end }}
