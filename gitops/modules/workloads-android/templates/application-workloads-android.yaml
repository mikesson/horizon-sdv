# Child Application: multi-source workloads-android (gitops values, aaos-builder, docker_image_template,
# cf-instance-template, cvd-launcher, cts-execution). Inline **gemini-review** on aaos-builder / cvd-launcher /
# cts-execution runs workloads/common/agentic-ai/gemini/run_ai_review.sh when Gemini is enabled.
# Deployed only via Module Manager enable (mod-workloads-android → this Application).
# Applied when Module Manager enable creates mod-workloads-android.
{{- if and .Values.repo.url .Values.repo.revision }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.config.namespacePrefix }}workloads-android
  namespace: {{ .Values.config.namespacePrefix }}argocd
  labels:
    app.kubernetes.io/name: workloads-android
    horizon-sdv.io/module: {{ .Values.moduleName }}
    horizon-sdv.io/app-role: child
    horizon-sdv.io/module-manager-managed: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.config.namespacePrefix }}horizon-sdv
  sources:
    - repoURL: {{ .Values.repo.url | quote }}
      targetRevision: {{ .Values.repo.revision | quote }}
      path: gitops/workloads/android
      helm:
        values: |
          config:
            namespacePrefix: {{ .Values.config.namespacePrefix | quote }}
            projectID: {{ .Values.config.projectID | quote }}
            region: {{ .Values.config.region | quote }}
            zone: {{ .Values.config.zone | quote }}
    - repoURL: {{ .Values.repo.url | quote }}
      targetRevision: {{ .Values.repo.revision | quote }}
      path: workloads/android/pipelines/builds/aaos_builder/helm
      helm:
        values: |
          namespacePrefix: {{ .Values.config.namespacePrefix | quote }}
          scm:
            authMethod: {{ .Values.config.scm.authMethod | quote }}
          spec:
            cloudProject: {{ .Values.config.projectID | quote }}
            cloudRegion: {{ .Values.config.region | quote }}
            cloudZone: {{ .Values.config.zone | quote }}
            horizonDomain: {{ .Values.config.domain | quote }}
            pipelineRepoUrl: {{ .Values.config.workloads.android.url | quote }}
            pipelineRepoRevision: {{ .Values.config.workloads.android.branch | quote }}
            pipelineRepoSecret: {{ if or (eq .Values.config.scm.authMethod "userpass") (eq .Values.config.scm.authMethod "app") }}{{ "workflow-pipeline-git-creds" | quote }}{{ else }}{{ "" | quote }}{{ end }}
    - repoURL: {{ .Values.repo.url | quote }}
      targetRevision: {{ .Values.repo.revision | quote }}
      path: workloads/android/pipelines/environment/docker_image_template/helm
      helm:
        values: |
          namespacePrefix: {{ .Values.config.namespacePrefix | quote }}
          scm:
            authMethod: {{ .Values.config.scm.authMethod | quote }}
          cloudEnvConfigMapName: "horizon-workflow-cloud-env"
          spec:
            cloudProject: {{ .Values.config.projectID | quote }}
            cloudRegion: {{ .Values.config.region | quote }}
            cloudZone: {{ .Values.config.zone | quote }}
            pipelineRepoUrl: {{ .Values.config.workloads.android.url | quote }}
            pipelineRepoRevision: {{ .Values.config.workloads.android.branch | quote }}
            pipelineRepoSecret: {{ if or (eq .Values.config.scm.authMethod "userpass") (eq .Values.config.scm.authMethod "app") }}{{ "workflow-pipeline-git-creds" | quote }}{{ else }}{{ "" | quote }}{{ end }}
    - repoURL: {{ .Values.repo.url | quote }}
      targetRevision: {{ .Values.repo.revision | quote }}
      path: workloads/android/pipelines/environment/cf_instance_template/helm
      helm:
        releaseName: workloads-android-cf-instance-template
        values: |
          namespacePrefix: {{ .Values.config.namespacePrefix | quote }}
          git:
            authMethod: {{ .Values.config.scm.authMethod | quote }}
          scm:
            authMethod: {{ .Values.config.scm.authMethod | quote }}
          cloudEnvConfigMapName: "horizon-workflow-cloud-env"
          {{- /* ARM64 Cuttlefish placement (config.arm64 / Terraform arm64_*). Not config.region/config.zone (primary GKE). */}}
          {{- if .Values.config.arm64 }}
          arm64:
            region: {{ .Values.config.arm64.region | quote }}
            zone: {{ .Values.config.arm64.zone | quote }}
            subnetwork: {{ .Values.config.arm64.subnetwork | quote }}
          {{- end }}
          kcc:
            instanceTemplates:
              enabled: true
              publisherIdentity:
                serviceAccountName: jenkins-sa
          spec:
            cloudProject: {{ .Values.config.projectID | quote }}
            cloudRegion: {{ .Values.config.region | quote }}
            cloudZone: {{ .Values.config.zone | quote }}
            pipelineRepoUrl: {{ .Values.config.workloads.android.url | quote }}
            pipelineRepoRevision: {{ .Values.config.workloads.android.branch | quote }}
            pipelineRepoSecret: {{ if or (eq .Values.config.scm.authMethod "userpass") (eq .Values.config.scm.authMethod "app") }}{{ "workflow-pipeline-git-creds" | quote }}{{ else }}{{ "" | quote }}{{ end }}
    - repoURL: {{ .Values.repo.url | quote }}
      targetRevision: {{ .Values.repo.revision | quote }}
      path: workloads/android/pipelines/tests/cvd_launcher/helm
      helm:
        releaseName: workloads-android-cvd-launcher
        values: |
          namespacePrefix: {{ .Values.config.namespacePrefix | quote }}
          git:
            authMethod: {{ .Values.config.scm.authMethod | quote }}
          scm:
            authMethod: {{ .Values.config.scm.authMethod | quote }}
          cloudEnvConfigMapName: "horizon-workflow-cloud-env"
          spec:
            cloudProject: {{ .Values.config.projectID | quote }}
            cloudRegion: {{ .Values.config.region | quote }}
            cloudZone: {{ .Values.config.zone | quote }}
            pipelineRepoUrl: {{ .Values.config.workloads.android.url | quote }}
            pipelineRepoRevision: {{ .Values.config.workloads.android.branch | quote }}
            pipelineRepoSecret: {{ if or (eq .Values.config.scm.authMethod "userpass") (eq .Values.config.scm.authMethod "app") }}{{ "workflow-pipeline-git-creds" | quote }}{{ else }}{{ "" | quote }}{{ end }}
            mtkConnectSecretName: {{ .Values.config.workloads.android.mtkConnectSecretName | default "workflow-mtk-connect-apikey" | quote }}
            mtkConnectUsernameKey: {{ .Values.config.workloads.android.mtkConnectUsernameKey | default "username" | quote }}
            mtkConnectPasswordKey: {{ .Values.config.workloads.android.mtkConnectPasswordKey | default "password" | quote }}
    - repoURL: {{ .Values.repo.url | quote }}
      targetRevision: {{ .Values.repo.revision | quote }}
      path: workloads/android/pipelines/tests/cts_execution/helm
      helm:
        releaseName: workloads-android-cts-execution
        values: |
          namespacePrefix: {{ .Values.config.namespacePrefix | quote }}
          git:
            authMethod: {{ .Values.config.scm.authMethod | quote }}
          scm:
            authMethod: {{ .Values.config.scm.authMethod | quote }}
          cloudEnvConfigMapName: "horizon-workflow-cloud-env"
          spec:
            cloudProject: {{ .Values.config.projectID | quote }}
            cloudRegion: {{ .Values.config.region | quote }}
            cloudZone: {{ .Values.config.zone | quote }}
            pipelineRepoUrl: {{ .Values.config.workloads.android.url | quote }}
            pipelineRepoRevision: {{ .Values.config.workloads.android.branch | quote }}
            pipelineRepoSecret: {{ if or (eq .Values.config.scm.authMethod "userpass") (eq .Values.config.scm.authMethod "app") }}{{ "workflow-pipeline-git-creds" | quote }}{{ else }}{{ "" | quote }}{{ end }}
            mtkConnectSecretName: {{ .Values.config.workloads.android.mtkConnectSecretName | default "workflow-mtk-connect-apikey" | quote }}
            mtkConnectUsernameKey: {{ .Values.config.workloads.android.mtkConnectUsernameKey | default "username" | quote }}
            mtkConnectPasswordKey: {{ .Values.config.workloads.android.mtkConnectPasswordKey | default "password" | quote }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.config.namespacePrefix }}workflows
  syncPolicy:
    # Omit PrunePropagationPolicy=foreground: cf_instance_template KCC publisher RBAC uses sync-waves so
    # RoleBinding (higher wave) prunes before Role; app-level foreground stacked with per-resource
    # foreground and caused resources-finalizer DeletionError (Role 404) on module disable.
    # automated.prune only: self-heal defaults to false and must not be set explicitly — Argo CD does not
    # reliably persist selfHeal:false (omitempty); the field drifts absent vs desired and the parent mod-*
    # Application stays OutOfSync (portal UPDATE IN PROGRESS) with self-heal off. Self-heal during
    # resources-finalizer delete can re-queue sync while the Application is still deleting (Deleting→Sync wedge).
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
{{- end }}

