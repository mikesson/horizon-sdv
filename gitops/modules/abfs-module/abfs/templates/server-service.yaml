{{- if and (include "abfs.licensed" .) .Values.server.enabled }}
# ABFS server Service. Named "abfs-server" so in-cluster uploaders/bootstrap reach
# it at abfs-server:50051, and (when internalLoadBalancer=true) it also exposes an
# internal L4 IP for out-of-cluster clients (Cloud Workstations / CI).
apiVersion: v1
kind: Service
metadata:
  name: {{ include "abfs.server.name" . }}
  labels:
    {{- include "abfs.labels" . | nindent 4 }}
    {{- include "abfs.server.selectorLabels" . | nindent 4 }}
  {{- if or .Values.server.service.internalLoadBalancer .Values.server.service.annotations .Values.commonAnnotations }}
  annotations:
    {{- if .Values.server.service.internalLoadBalancer }}
    networking.gke.io/load-balancer-type: "Internal"
    {{- end }}
    {{- with .Values.server.service.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  type: {{ if .Values.server.service.internalLoadBalancer }}LoadBalancer{{ else }}ClusterIP{{ end }}
  selector:
    {{- include "abfs.server.selectorLabels" . | nindent 4 }}
  ports:
    - name: grpc
      port: {{ .Values.server.service.port }}
      targetPort: {{ .Values.server.service.port }}
      protocol: TCP
{{- end }}
