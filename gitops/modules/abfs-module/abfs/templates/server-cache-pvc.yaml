{{- if and (include "abfs.licensed" .) .Values.server.enabled .Values.server.cache.enabled }}
# Optional persistent cache PVC for the ABFS server (server.cache.enabled). The
# server attaches no data disk by default; this adds a durable cache. With
# server.cache.retainOnDelete the PVC survives `helm uninstall` (resource-policy: keep).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: abfs-server-cache
  labels:
    {{- include "abfs.labels" . | nindent 4 }}
    {{- include "abfs.server.selectorLabels" . | nindent 4 }}
  {{- if or .Values.server.cache.retainOnDelete .Values.commonAnnotations }}
  annotations:
    {{- if .Values.server.cache.retainOnDelete }}
    helm.sh/resource-policy: keep
    {{- end }}
    {{- with .Values.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: {{ .Values.server.cache.storageClass }}
  resources:
    requests:
      storage: {{ .Values.server.cache.size }}
{{- end }}
