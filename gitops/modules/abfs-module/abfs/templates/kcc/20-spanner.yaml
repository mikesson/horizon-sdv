# Spanner instance + database.
#
# SpannerInstance uses the DIRECT reconciler (annotation required) so that
# autoscalingConfig / edition / defaultBackupScheduleType are honored.
#
# SCHEMA: the ABFS server (image 0.1.14) does NOT create the Spanner schema at runtime
# (the binary links no DDL-admin API), so the deploy must apply it — exactly as the
# Terraform module does (google_spanner_database.ddl from files/schemas/<ver>-schema.sql,
# gated by abfs_spanner_database_create_tables). The SpannerDatabase below carries that
# schema in spec.ddl (mirrors infra/schemas/0.0.31-schema.sql); scripts/render.sh sets
# ddl: [] when CREATE_TABLES != true (the KCC equivalent of create_tables=false). Do NOT
# edit ddl after first apply (data loss) — like Terraform's ignore_changes = [ddl].
# See docs/03-spanner-schema-ownership.md.
---
apiVersion: spanner.cnrm.cloud.google.com/v1beta1
kind: SpannerInstance
metadata:
  name: abfs
  namespace: {{ .Values.namespace }}
  annotations:
    # Required for autoscalingConfig / edition / defaultBackupScheduleType support.
    alpha.cnrm.cloud.google.com/reconciler: "direct"
    # Protect data on CR deletion: abandon the instance. Deleting the instance would
    # otherwise delete the instance AND all its databases, bypassing the database's
    # own abandon policy below.
    cnrm.cloud.google.com/deletion-policy: "abandon"
spec:
  # e.g. regional-europe-west1
  config: {{ .Values.spanner.config }}
  displayName: ABFS
  edition: ENTERPRISE
  defaultBackupScheduleType: AUTOMATIC
  autoscalingConfig:
    autoscalingLimits:
      minNodes: 1
      maxNodes: 10
    autoscalingTargets:
      highPriorityCpuUtilizationPercent: 65
      storageUtilizationPercent: 95
---
apiVersion: spanner.cnrm.cloud.google.com/v1beta1
kind: SpannerDatabase
metadata:
  name: abfs
  namespace: {{ .Values.namespace }}
  annotations:
    # Protect data on CR deletion (abandon the database instead of deleting it).
    cnrm.cloud.google.com/deletion-policy: "abandon"
spec:
  instanceRef:
    name: abfs
  # databaseDialect defaults to GOOGLE_STANDARD_SQL.
  # ABFS schema (mirrors infra/schemas/0.0.31-schema.sql). render.sh replaces this whole
  # block with `ddl: []` when CREATE_TABLES != true. Each item is one DDL statement.
  ddl: # ABFS-DDL-BEGIN (render.sh strips to [] when CREATE_TABLES != true)
    - 'CREATE TABLE Objects (ObjectId STRING(128), AddTime TIMESTAMP NOT NULL, Type STRING(64) NOT NULL, Size INT64 NOT NULL, ContentEncoding STRING(64) NOT NULL, Content STRING(MAX) NOT NULL) PRIMARY KEY (ObjectId)'
    - 'CREATE SEQUENCE LinkIdSequence OPTIONS (sequence_kind="bit_reversed_positive")'
    - 'CREATE TABLE Links (LinkId INT64 DEFAULT (GET_NEXT_SEQUENCE_VALUE(SEQUENCE LinkIdSequence)), Index INT64 NOT NULL, `From` STRING(128) NOT NULL, `To` STRING(128) NOT NULL, CONSTRAINT FK_Links_From FOREIGN KEY (`From`) REFERENCES Objects (ObjectId) ON DELETE CASCADE, CONSTRAINT FK_Links_To FOREIGN KEY (`To`) REFERENCES Objects (ObjectId)) PRIMARY KEY (LinkId)'
    - 'CREATE INDEX LinksFromIndex ON Links(`From`)'
    - 'CREATE INDEX LinksToIndex ON Links(`To`)'
    - 'CREATE SEQUENCE ChunkIdSequence OPTIONS (sequence_kind="bit_reversed_positive")'
    - 'CREATE TABLE Chunks (ChunkId INT64 DEFAULT (GET_NEXT_SEQUENCE_VALUE(SEQUENCE ChunkIdSequence)), AddedOn TIMESTAMP NOT NULL, Content BYTES(MAX) NOT NULL) PRIMARY KEY (ChunkId)'
    - 'CREATE TABLE ChunkTouches (ChunkId INT64 NOT NULL, TouchedOn TIMESTAMP NOT NULL, Gen INT64 NOT NULL) PRIMARY KEY (ChunkId)'
    - 'CREATE SEQUENCE MapIdSequence OPTIONS (sequence_kind="bit_reversed_positive")'
    - 'CREATE TABLE Maps (MapId INT64 DEFAULT (GET_NEXT_SEQUENCE_VALUE(SEQUENCE MapIdSequence)), AddTime TIMESTAMP NOT NULL, `From` STRING(128) NOT NULL, `To` STRING(128) NOT NULL, CONSTRAINT FK_Maps_From FOREIGN KEY (`From`) REFERENCES Objects (ObjectId), CONSTRAINT FK_Maps_To FOREIGN KEY (`To`) REFERENCES Objects (ObjectId)) PRIMARY KEY (MapId)'
    - 'CREATE INDEX MapsFromIndex ON Maps(`From`)'
    - 'CREATE INDEX MapsToIndex ON Maps(`To`)'
    - 'CREATE SEQUENCE ProjectIdSequence OPTIONS (sequence_kind="bit_reversed_positive")'
    - 'CREATE TABLE Projects (ProjectId INT64 DEFAULT (GET_NEXT_SEQUENCE_VALUE(SEQUENCE ProjectIdSequence)), Host STRING(MAX) NOT NULL, Project STRING(MAX) NOT NULL) PRIMARY KEY (ProjectId)'
    - 'CREATE UNIQUE INDEX ProjectsIndex ON Projects(Host, Project)'
    - 'CREATE SEQUENCE RefIdSequence OPTIONS (sequence_kind="bit_reversed_positive")'
    - 'CREATE TABLE Refs (ProjectId INT64 NOT NULL, Ref STRING(MAX) NOT NULL, UpdateTime TIMESTAMP NOT NULL, Target STRING(128), CONSTRAINT FK_Refs_ProjectId FOREIGN KEY (ProjectId) REFERENCES Projects (ProjectId), CONSTRAINT FK_Refs_TargetId FOREIGN KEY (Target) REFERENCES Objects (ObjectId)) PRIMARY KEY (ProjectId, Ref)'
    - 'CREATE INDEX RefsRefIndex ON Refs(Ref)'
  # ABFS-DDL-END
  # Optional stronger GCP-native drop protection (uncomment if desired):
  # enableDropProtection: true
