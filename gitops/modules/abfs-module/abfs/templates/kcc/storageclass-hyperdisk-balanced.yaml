# Cluster-bootstrap StorageClass: Hyperdisk Balanced via the Compute Engine PD CSI
# driver. REPLACES the old pd-ssd class — the dedicated abfs-data node pool uses a
# Titanium machine family (N4D/N4/C4D) which supports **Hyperdisk only**, so pd-ssd
# would not bind there. Hyperdisk Balanced gives independently tunable IOPS +
# throughput and online resize.
#
# Plain Kubernetes object (NOT Config Connector); applied once at cluster bootstrap
# (see docs/02 / docs/04). WaitForFirstConsumer delays PV creation until the consuming
# pod is scheduled, so the zonal disk is created in that pod's zone.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: hyperdisk-balanced
provisioner: pd.csi.storage.gke.io
parameters:
  type: hyperdisk-balanced
  # Optional explicit performance (else capacity-based defaults). Tune to uploader load:
  # provisioned-iops-on-create: "3000"
  # provisioned-throughput-on-create: "140"   # MiB/s
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
