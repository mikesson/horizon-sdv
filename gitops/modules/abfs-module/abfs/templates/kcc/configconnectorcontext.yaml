# Binds the "abfs" namespace to the Google service account that Config Connector
# uses to reconcile resources for this namespace (namespaced mode).
#
# Prereqs (see docs/02-prerequisites-cluster-and-kcc.md):
#   * GSA cnrm-system@{{ .Values.gcpProjectId }}.iam.gserviceaccount.com exists and has the
#     roles needed to manage everything in infra/ (broad: roles/owner, or a tight
#     custom set).
#   * Workload Identity binding granting roles/iam.workloadIdentityUser to
#     serviceAccount:{{ .Values.gcpProjectId }}.svc.id.goog[cnrm-system/cnrm-controller-manager-abfs]
apiVersion: core.cnrm.cloud.google.com/v1beta1
kind: ConfigConnectorContext
metadata:
  name: configconnectorcontext.core.cnrm.cloud.google.com
  namespace: {{ .Values.namespace }}
spec:
  googleServiceAccount: "cnrm-system@{{ .Values.gcpProjectId }}.iam.gserviceaccount.com"
  # See configconnector.yaml — Absent avoids autoscaling-field update loops and is
  # the recommended/default behavior. Per-namespace value in namespaced mode.
  stateIntoSpec: Absent
