{{- if and (include "abfs.licensed" .) .Values.server.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "abfs.server.name" . }}
  labels:
    {{- include "abfs.labels" . | nindent 4 }}
    {{- include "abfs.server.selectorLabels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.server.replicas }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "abfs.server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "abfs.labels" . | nindent 8 }}
        {{- include "abfs.server.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ .Values.serviceAccounts.server }}
      automountServiceAccountToken: {{ .Values.automountServiceAccountToken }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.casfs.requireReady }}
      initContainers:
        {{- include "abfs.waitForCasfsInit" . | nindent 8 }}
      {{- end }}
      # --pid=host
      hostPID: {{ .Values.hostPID }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: abfs-server
          image: {{ include "abfs.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Image entrypoint reads RUN_MODE; args are the server ABFS command.
          args:
            - --project
            - {{ .Values.projectId | quote }}
            - --bucket
            - {{ .Values.bucket | quote }}
            - --instance
            - {{ .Values.spanner.instance | quote }}
            - --db
            - {{ .Values.spanner.database | quote }}
            {{- range .Values.extraParams }}
            - {{ . | quote }}
            {{- end }}
          env:
            {{- include "abfs.gomaxprocsEnv" . | nindent 12 }}
            - name: RUN_MODE
              value: "server"
            - name: NEEDS_GIT
              value: "false"
            - name: HOME
              value: "/home/abfs-server"
            {{- if .Values.otel.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.endpoint | quote }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
            - name: OTEL_SERVICE_NAME
              value: "abfs-server"
            {{- end }}
          ports:
            - name: grpc
              containerPort: {{ .Values.server.service.port }}
          # --privileged --cap-add=all to use the casfs mount (the module is loaded on
          # the node per casfs.provider — see docs/02 §1b). The usual non-root/
          # readOnlyRootFilesystem hardening cannot apply to a casfs mount.
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.server.resources | nindent 12 }}
          {{- if .Values.server.probes.startup.enabled }}
          startupProbe:
            {{- include "abfs.probe" (dict "cfg" .Values.server.probes.startup "port" .Values.server.service.port) | nindent 12 }}
          {{- end }}
          {{- if .Values.server.probes.readiness.enabled }}
          readinessProbe:
            {{- include "abfs.probe" (dict "cfg" .Values.server.probes.readiness "port" .Values.server.service.port) | nindent 12 }}
          {{- end }}
          {{- if .Values.server.probes.liveness.enabled }}
          livenessProbe:
            {{- include "abfs.probe" (dict "cfg" .Values.server.probes.liveness "port" .Values.server.service.port) | nindent 12 }}
          {{- end }}
          volumeMounts:
            # Writable HOME ($HOME=/home/abfs-server) — not present in the image.
            - name: home
              mountPath: /home/abfs-server
            {{- if .Values.server.cache.enabled }}
            - name: cache
              mountPath: {{ .Values.server.cache.mountPath }}
            {{- end }}
      volumes:
        - name: home
          emptyDir: {}
        {{- if .Values.server.cache.enabled }}
        - name: cache
          persistentVolumeClaim:
            claimName: abfs-server-cache
        {{- end }}
{{- end }}
