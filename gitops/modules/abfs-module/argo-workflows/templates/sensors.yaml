apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: webhook-abfs-smoke-test
  namespace: {{ .Values.eventsNamespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "8"
spec:
  eventBusName: default
  template:
    serviceAccountName: sensor-submit-workflow
  dependencies:
    - name: webhook-dep
      eventSourceName: webhook
      eventName: workflow-dispatch
      filters:
        data:
          - path: body.workflowTemplateName
            type: string
            value:
              - "abfs-smoke-test"
  triggers:
    - template:
        name: submit-smoke-test
        argoWorkflow:
          operation: submit
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: webhook-abfs-smoke-
                namespace: {{ .Values.workflowNamespace }}
              spec:
                workflowTemplateRef:
                  name: abfs-smoke-test
                arguments:
                  parameters:
                    - name: horizonSubmittedFrom
                    - name: abfsEnv
                    - name: abfsBuildId
                    - name: abfsNote
          parameters:
            - src:
                dependencyName: webhook-dep
                dataKey: body.horizonSubmittedBy
              dest: metadata.annotations.horizon-sdv\.io/submitted-by
            - src:
                dependencyName: webhook-dep
                dataKey: body.horizonSubmittedFrom
              dest: metadata.labels.horizon-sdv\.io/submitted-from
            - src:
                dependencyName: webhook-dep
                dataKey: body.horizonSubmittedFrom
              dest: spec.arguments.parameters.0.value
            - src:
                dependencyName: webhook-dep
                dataKey: body.abfsEnv
              dest: spec.arguments.parameters.1.value
            - src:
                dependencyName: webhook-dep
                dataKey: body.abfsBuildId
              dest: spec.arguments.parameters.2.value
            - src:
                dependencyName: webhook-dep
                dataKey: body.abfsNote
              dest: spec.arguments.parameters.3.value
