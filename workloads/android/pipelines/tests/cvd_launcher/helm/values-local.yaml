# Local helm template / dry-run only. On GKE, GitOps sets spec.* from workloads-android module config;
# cloud env comes from horizon-workflow-cloud-env when cloudEnvConfigMapName is set.
namespacePrefix: ""
sharedPipelineWorkspace: false
spec:
  cloudProject: "local-project"
  cloudRegion: "us-central1"
  cloudZone: "us-central1-a"
  pipelineRepoUrl: "https://example.invalid/acn-horizon-sdv.git"
  pipelineRepoRevision: "main"
