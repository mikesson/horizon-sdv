# Description:
# Argo WorkflowTemplate for building AAOS docker images. Exposed in the Horizon Developer Portal under module workloads-android (horizon-sdv.io/expose=true). Also used internally by aaos-builder via templateRef and by Argo Events sensor webhook-aaos-builder-runtime-image.
# Argo Events: Sensor webhook-aaos-builder-runtime-image (workflow/sensors.yaml).
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: {{ .Values.workflowTemplateName | quote }}
  namespace: {{ include "aaos-builder-runtime-image.workflowNamespace" . | quote }}
  labels:
    app.kubernetes.io/name: aaos-builder-runtime-image
    horizon-sdv.io/expose: "true"
    horizon-sdv.io/module: workloads-android
  annotations:
    argocd.argoproj.io/sync-wave: "8"
spec:
  entrypoint: build
  # Align with Argo controller artifactRepository.archiveLogs (GCS); same as aaos-builder WorkflowTemplate.
  archiveLogs: true
{{- if .Values.aaosBuilderRuntimeImageConcurrencyMutexName }}
  synchronization:
    mutex:
      name: {{ .Values.aaosBuilderRuntimeImageConcurrencyMutexName | quote }}
{{- end }}
  serviceAccountName: {{ include "aaos-builder-runtime-image.workflowServiceAccountName" . | quote }}
{{- if .Values.workflowTtlSecondsAfterCompletion }}
  # TTL deletes workflow objects after completion (set via values).
  ttlStrategy:
    secondsAfterCompletion: {{ .Values.workflowTtlSecondsAfterCompletion }}
{{- end }}
{{- if .Values.podGcStrategy }}
  # podGC strategy per Argo (e.g., OnPodCompletion, OnWorkflowCompletion).
  podGC:
    strategy: {{ .Values.podGcStrategy | quote }}
{{- end }}
  arguments:
    parameters:
      - name: horizonSubmittedFrom
        value: ""
        description: "Where the submit call originated (Horizon); mirrored on workflow label horizon-sdv.io/submitted-from."
      - name: dockerArtifactPathName
        value: {{ .Values.spec.dockerArtifactPathName | quote }}
        description: "Artifact registry image path (repo/name)."
      - name: dryRun
        value: {{ .Values.spec.dryRun | quote }}
        description: "When true, do not push built images."
      - name: imageTag
        value: {{ .Values.spec.imageTag | quote }}
        description: "Image tag to build/push."
      - name: linuxDistribution
        value: {{ .Values.spec.linuxDistribution | quote }}
        description: "Base distro for the Dockerfile build."
      - name: nodejsVersion
        value: {{ .Values.spec.nodejsVersion | quote }}
        description: "Node.js version to install."
      - name: gcloudCliVersion
        value: {{ .Values.spec.gcloudCliVersion | quote }}
        description: "gcloud CLI version to install."
      - name: kubectlVersion
        value: {{ .Values.spec.kubectlVersion | quote }}
        description: "kubectl version to install."
      - name: enableGeminiAiAssistant
        value: {{ .Values.spec.enableGeminiAiAssistant | quote }}
        description: "Enable Gemini AI tooling in the image."
      - name: geminiCliVersion
        value: {{ .Values.spec.geminiCliVersion | quote }}
        description: "Gemini CLI version to install."
  templates:
{{- include "aaos-builder-runtime-image.templates" . | nindent 2 }}
