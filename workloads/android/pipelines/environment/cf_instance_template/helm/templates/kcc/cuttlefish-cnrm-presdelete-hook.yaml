# PreDelete: remove pipeline-owned ComputeInstanceTemplate CRs before ConfigConnectorContext prunes,
# so Config Connector can finalize CCC deletion during workloads-android uninstall (no manual kubectl).
# Primary: label horizon-sdv.io/cuttlefish-kcc-template=true (cf_create_instance_template.sh). Fallback:
# delete by Kubernetes name prefix cf-it-* (same as cuttlefish_kcc_template_k8s_name) for legacy CRs
# or if label-based delete missed any, so CCC is not stuck on "cannot finalize deletion… ComputeInstanceTemplate".
{{- if and .Values.kcc .Values.kcc.instanceTemplates .Values.kcc.instanceTemplates.enabled }}
{{- $ns := include "cf-instance-template.workflowNamespace" . }}
{{- $img := .Values.spec.cnrmPresDeleteImage | default "gcr.io/google.com/cloudsdktool/cloud-sdk:461.0.0" }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cf-instance-template-cnrm-presdelete
  namespace: {{ $ns | quote }}
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cf-instance-template-cnrm-presdelete
  namespace: {{ $ns | quote }}
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
rules:
  - apiGroups: ["compute.cnrm.cloud.google.com"]
    resources: ["computeinstancetemplates"]
    verbs: ["get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cf-instance-template-cnrm-presdelete
  namespace: {{ $ns | quote }}
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cf-instance-template-cnrm-presdelete
subjects:
  - kind: ServiceAccount
    name: cf-instance-template-cnrm-presdelete
    namespace: {{ $ns | quote }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: cf-instance-template-cnrm-presdelete
  namespace: {{ $ns | quote }}
  annotations:
    argocd.argoproj.io/hook: PreDelete
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    # KCC can take a long time to finalize GCP deletion; default hook timeout is too short for busy clusters.
    argocd.argoproj.io/hook-timeout: "1200"
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cf-instance-template-cnrm-presdelete
    spec:
      serviceAccountName: cf-instance-template-cnrm-presdelete
      restartPolicy: Never
      {{- if .Values.spec.nodeSelector }}
      nodeSelector:
{{- toYaml .Values.spec.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.spec.tolerations }}
      tolerations:
{{- toYaml .Values.spec.tolerations | nindent 8 }}
      {{- end }}
      containers:
        - name: kubectl
          image: {{ $img | quote }}
          imagePullPolicy: IfNotPresent
          command: [bash, -euo, pipefail, -c]
          args:
            - |
              set -euo pipefail
              ns="{{ $ns }}"
              echo "PreDelete: removing Cuttlefish ComputeInstanceTemplate CRs (labeled) in ${ns}"
              kubectl delete computeinstancetemplates.compute.cnrm.cloud.google.com \
                -n "${ns}" \
                -l horizon-sdv.io/cuttlefish-kcc-template=true \
                --ignore-not-found=true \
                --wait=true \
                --timeout=900s
              echo "PreDelete: fallback — any remaining cf-it-* ComputeInstanceTemplate (legacy / missed label)"
              while IFS= read -r res; do
                [ -z "${res}" ] && continue
                base="${res##*/}"
                case "${base}" in cf-it-*)
                  kubectl delete "${res}" -n "${ns}" \
                    --ignore-not-found=true \
                    --wait=true \
                    --timeout=900s
                  ;;
                esac
              done < <(kubectl get computeinstancetemplates.compute.cnrm.cloud.google.com -n "${ns}" -o name 2>/dev/null || true)
              echo "PreDelete: safety net — remove any remaining ComputeInstanceTemplate in ${ns} (workflows namespace is dedicated to this chart; unblocks CCC finalizer)"
              kubectl delete computeinstancetemplates.compute.cnrm.cloud.google.com \
                -n "${ns}" \
                --all \
                --ignore-not-found=true \
                --wait=true \
                --timeout=900s
              echo "PreDelete: CNRM Cuttlefish templates cleared"
{{- end }}
