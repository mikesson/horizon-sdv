# RBAC for the pipeline publisher service account to CRUD ComputeInstanceTemplate via KCC.
{{- if and .Values.kcc .Values.kcc.instanceTemplates .Values.kcc.instanceTemplates.enabled }}
{{- $targetNamespace := include "cf-instance-template.workflowNamespace" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cuttlefish-kcc-instance-template-publisher
  namespace: {{ $targetNamespace | quote }}
  annotations:
    # Argo prunes reverse sync-wave order: RoleBinding (wave 1) before Role (wave 0).
    # Do not set PrunePropagationPolicy=foreground here or on the child Application: stacking it
    # with multi-source Helm teardown was associated with resources-finalizer DeletionError on
    # this Role after it was already removed (404 on a second delete pass).
    argocd.argoproj.io/sync-wave: "0"
rules:
  - apiGroups: ["compute.cnrm.cloud.google.com"]
    resources: ["computeinstancetemplates"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cuttlefish-kcc-instance-template-publisher
  namespace: {{ $targetNamespace | quote }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cuttlefish-kcc-instance-template-publisher
subjects:
  - kind: ServiceAccount
    name: {{ include "cf-instance-template.publisherIdentityServiceAccountName" . | quote }}
    namespace: {{ include "cf-instance-template.publisherIdentityNamespace" . | quote }}
{{- end }}

