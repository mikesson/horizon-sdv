{{- if and .Values.kcc .Values.kcc.instanceTemplates .Values.kcc.instanceTemplates.enabled }}
---
apiVersion: core.cnrm.cloud.google.com/v1beta1
kind: ConfigConnectorContext
metadata:
  name: configconnectorcontext.core.cnrm.cloud.google.com
  namespace: {{ include "cf-instance-template.workflowNamespace" . | quote }}
  annotations:
    # Create early; prune late. Context deletion can be blocked by remaining CNRM resources.
    argocd.argoproj.io/sync-wave: "-1"
spec:
  googleServiceAccount: {{ .Values.kcc.instanceTemplates.configConnectorGoogleServiceAccount | default (printf "gke-config-connector-sa@%s.iam.gserviceaccount.com" .Values.spec.cloudProject) | quote }}
{{- end }}

